# air.conf — Go hot reload for new-api

root_dir = "."
tmp_dir = "tmp"

[build]
  bin = "./new-api"
  cmd = "go build -o new-api ."
  include_dir = ["common", "common/limiter", "constant", "controller", "dto", "electron", "i18n", "logger", "middleware", "model", "oauth", "pkg", "relay", "router", "service", "setting", "types"]
  exclude_dir = [".git", "bin", "tmp", "logs", ".air", "web"]
  exclude_regex = ["_test\\.go$"]
  include_ext = ["go"]
  delay = 1000
  wait = 500
  kill_on_change = true

[log]
  main_only = false

[misc]
  clean_on_exit = true
