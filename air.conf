# air.conf — Go hot reload for new-api

root_dir = "."
tmp_dir = "tmp"

[build]
  bin = "./new-api"
  cmd = "go build -o new-api ."
  exclude_dir = ["web", ".git", "tmp", "logs", ".air"]
  exclude_regex = ["_test\\.go$"]
  include_ext = ["go"]
  delay = 1000
  wait = 500
  kill_on_change = true

[log]
  main_only = false

[misc]
  clean_on_exit = true
